---
- name: Machine setup
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: Install homebrew packages
      community.general.homebrew:
        name: "{{ item }}"
        state: present
        path: "{{ ansible_env.HOME }}/.local/homebrew/bin"
      loop:
        - git
        - tree
        - htop
        - jq
        - neovim
        - zsh
        - tmux

    - name: Install uv packages
      ansible.builtin.command:
        cmd: uv tool install {{ item }}
      loop:
        - pre-commit
        - black
